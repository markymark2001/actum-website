<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Actum</title>
    <style>
      :root {
        color-scheme: dark;
        background: #111111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100dvh;
        background: #111111;
        color: #f2f0eb;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 48px));
      }

      p {
        margin: 0;
        font-size: 14px;
        line-height: 1.45;
        font-weight: 400;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Actum is building world's most capable AI employee for slack, teams, and telegram. More coming soon.</p>
    </main>
  </body>
</html>
